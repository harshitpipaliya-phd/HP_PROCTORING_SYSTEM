services:
  # ── Main API ──────────────────────────────────────────────────────────────
  - type: web
    name: hp-proctoring-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: DEBUG
        value: "false"
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "8000"
      - key: ENVIRONMENT
        value: "production"
      # Auth
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: "HS256"
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: INTERNAL_API_KEY
        generateValue: true
      # Redis
      - key: REDIS_URL
        fromService:
          name: hp-proctoring-redis
          type: redis
          property: connectionString
      # AI Worker
      - key: AI_WORKER_URL
        fromService:
          name: hp-proctoring-ai-worker
          type: web
          property: host
      # Supabase (set via Render dashboard — never commit real values)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      # Cloudinary (set via Render dashboard)
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Webhook
      - key: HP_WEBHOOK_SECRET
        generateValue: true
      - key: HP_WEBHOOK_URL
        value: "https://your-hp-instance/webhook"
      # Detection settings
      - key: VIDEO_MAX_FPS
        value: "15"
      - key: VIDEO_FRAME_SKIP
        value: "1"
      - key: RISK_THRESHOLD
        value: "50"
      # Audio
      - key: AUDIO_SAMPLE_RATE
        value: "16000"
      - key: AUDIO_CHUNK_SIZE
        value: "512"
      # Storage
      - key: SCREENSHOT_DIR
        value: "static/screenshots"
      - key: REPORT_DIR
        value: "static/reports"
      # Models
      - key: AUDIO_MODEL_PATH
        value: "models/audio_classifier.pkl"
      - key: MODEL_META_PATH
        value: "models/model_meta.json"
      # CORS
      - key: CORS_ORIGINS
        value: "*"

  # ── AI Worker ─────────────────────────────────────────────────────────────
  - type: web
    name: hp-proctoring-ai-worker
    runtime: docker
    dockerfilePath: ./ai_workers/Dockerfile
    dockerContext: .
    envVars:
      - key: INTERNAL_API_KEY
        fromService:
          name: hp-proctoring-api
          type: web
          envVarKey: INTERNAL_API_KEY
      - key: REDIS_URL
        fromService:
          name: hp-proctoring-redis
          type: redis
          property: connectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: AI_WORKER_PORT
        value: "7860"

  # ── Celery Worker (distributed task queue) ────────────────────────────────
  # Fix: missing from original render.yaml — required for async report
  # generation, frame processing tasks, and cleanup jobs.
  - type: worker
    name: hp-proctoring-celery-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A workers.celery_app worker --loglevel=info --concurrency=2 -Q default,reports,frames
    envVars:
      - key: REDIS_URL
        fromService:
          name: hp-proctoring-redis
          type: redis
          property: connectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: INTERNAL_API_KEY
        fromService:
          name: hp-proctoring-api
          type: web
          envVarKey: INTERNAL_API_KEY
      - key: JWT_SECRET_KEY
        fromService:
          name: hp-proctoring-api
          type: web
          envVarKey: JWT_SECRET_KEY
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: REPORT_DIR
        value: "static/reports"
      - key: SCREENSHOT_DIR
        value: "static/screenshots"

  # ── Celery Beat (scheduled tasks: cleanup, report expiry) ─────────────────
  - type: worker
    name: hp-proctoring-celery-beat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A workers.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    envVars:
      - key: REDIS_URL
        fromService:
          name: hp-proctoring-redis
          type: redis
          property: connectionString

  # ── Redis ─────────────────────────────────────────────────────────────────
  - type: redis
    name: hp-proctoring-redis
    ipAllowList: []
    plan: free
